<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayaki Music — Coming Soon</title>
    <meta name="description" content="Mayaki Music — DJ, producer, and music artist. Official website coming soon.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* Animated gradient background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(120, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 120, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0, 180, 255, 0.10) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Equalizer bars */
        .equalizer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 3px;
            z-index: 0;
            opacity: 0.15;
            padding: 0 10%;
        }

        .eq-bar {
            flex: 1;
            max-width: 6px;
            background: linear-gradient(to top, #7c3aed, #ec4899);
            border-radius: 2px 2px 0 0;
            animation: eqBounce var(--duration) ease-in-out infinite alternate;
            transform-origin: bottom;
        }

        @keyframes eqBounce {
            0% { height: var(--min-h); }
            100% { height: var(--max-h); }
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 0%, #c084fc 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .tagline {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .coming-soon {
            display: inline-block;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.9rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            color: #fff;
            margin-bottom: 2.5rem;
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 20px rgba(124, 58, 237, 0.0); border-color: rgba(255,255,255,0.15); }
            100% { box-shadow: 0 0 30px rgba(124, 58, 237, 0.3); border-color: rgba(192, 132, 252, 0.4); }
        }

        .socials {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 0.5rem;
        }

        .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
        }

        .socials a:hover {
            color: #fff;
            border-color: rgba(192, 132, 252, 0.5);
            background: rgba(124, 58, 237, 0.15);
            transform: translateY(-2px);
        }

        .socials svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        @media (max-width: 480px) {
            .tagline { font-size: 0.9rem; letter-spacing: 0.2em; }
            .coming-soon { padding: 0.75rem 2rem; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div class="equalizer" id="equalizer"></div>

    <div class="content">
        <h1 class="logo">MAYAKI</h1>
        <p class="tagline">Music &amp; DJ</p>
        <div class="coming-soon">Coming Soon</div>
        <div class="socials">

                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <a href="https://facebook.com/mayakimusic" aria-label="Facebook" target="_blank" rel="noopener">

            </a>
        </div>
    </div>

    <script>
        // Generate equalizer bars
        const eq = document.getElementById('equalizer');
        const barCount = 80;
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'eq-bar';
            const minH = 4 + Math.random() * 15;
            const maxH = 30 + Math.random() * 90;
            const duration = 0.8 + Math.random() * 1.5;
            bar.style.setProperty('--min-h', minH + 'px');
            bar.style.setProperty('--max-h', maxH + 'px');
            bar.style.setProperty('--duration', duration + 's');
            bar.style.animationDelay = (Math.random() * 2) + 's';
            eq.appendChild(bar);
        }
    </script>
</body>
</html>
